<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>🗺️ 热点地图 - HotSpot Map</title>

  <!-- Favicon Emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* PWA 安装横幅样式 */
    .install-banner {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 16px;
      animation: slideUp 0.5s ease-out;
      max-width: 90%;
    }

    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    .install-banner:hover {
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    }

    .install-banner-icon {
      font-size: 32px;
    }

    .install-banner-text {
      flex: 1;
    }

    .install-banner-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .install-banner-desc {
      font-size: 14px;
      opacity: 0.9;
    }

    .install-banner-button {
      background: white;
      color: #667eea;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .install-banner-button:hover {
      background: #f0f0f0;
      transform: scale(1.05);
    }

    .install-banner-close {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .install-banner-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* iOS 安装模态框样式 */
    .ios-install-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .ios-modal-content {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .ios-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      border-bottom: 1px solid #eee;
      padding-bottom: 16px;
    }

    .ios-modal-header h2 {
      margin: 0;
      color: #333;
      font-size: 20px;
    }

    .ios-modal-close {
      background: #f5f5f5;
      border: none;
      color: #999;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .ios-modal-close:hover {
      background: #e0e0e0;
      color: #666;
    }

    .ios-modal-body {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .ios-step {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ios-step-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .ios-step-content {
      flex: 1;
    }

    .ios-step-icon {
      font-size: 24px;
      margin-right: 8px;
    }

    .ios-step-text {
      color: #666;
      font-size: 14px;
    }

    .ios-step-arrow {
      color: #999;
      font-size: 20px;
    }

    .ios-step:last-child .ios-step-arrow {
      display: none;
    }

    .ios-step:last-child .ios-step-text {
      color: #667eea;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <div class="sidebar">
      <h1>🗺️ 热点地图</h1>

      <!-- 数据刷新 -->
      <div class="section">
        <button id="refresh-btn" onclick="refreshData()" class="refresh-btn">🔄 刷新数据</button>
        <div class="refresh-status" id="refresh-status"></div>
      </div>

      <!-- 搜索框 -->
      <div class="section">
        <h2>搜索热点</h2>
        <div class="search-box">
          <input
            type="text"
            id="search-input"
            placeholder="搜索标题、城市、作者..."
            onkeypress="handleSearchKeypress(event)"
          />
          <button onclick="searchHotspots()">🔍</button>
        </div>
        <div class="search-status" id="search-status"></div>
      </div>

      <!-- 地图类型切换 -->
      <div class="section">
        <h2>地图类型</h2>
        <div class="map-toggle">
          <button id="btn-china" class="active" onclick="switchMap('china')">🇨🇳 中国地图</button>
          <button id="btn-world" onclick="switchMap('world')">🌍 世界地图</button>
        </div>
      </div>

      <!-- 快捷筛选 -->
      <div class="section">
        <h2>看什么？</h2>
        <div class="quick-filter-group">
          <button class="quick-filter active" onclick="quickFilter('all')">📍 全部热点</button>
          <button class="quick-filter" onclick="quickFilter('food')">🍜 美食探店</button>
          <button class="quick-filter" onclick="quickFilter('tourism')">🏝 旅游打卡</button>
          <button class="quick-filter" onclick="quickFilter('event')">🎪 漫展活动</button>
          <button class="quick-filter" onclick="quickFilter('social')">💬 社交热点</button>
        </div>
      </div>

      <!-- 来源选择 -->
      <div class="section">
        <h2>来源</h2>
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="plat-xiaohongshu" checked onchange="filterByPlatform('xiaohongshu', this.checked)">
            <label for="plat-xiaohongshu">📕 小红书</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="plat-weibo" checked onchange="filterByPlatform('weibo', this.checked)">
            <label for="plat-weibo">📟 微博</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="plat-douyin" checked onchange="filterByPlatform('douyin', this.checked)">
            <label for="plat-douyin">🎵 抖音</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="plat-bilibili" checked onchange="filterByPlatform('bilibili', this.checked)">
              <label for="plat-bilibili">📺️ B站</label>
            </div>
        </div>
      </div>

      <!-- 热点统计 -->
      <div class="section">
        <h2>热点统计</h2>
        <div class="stat-item">
          <span>📍 当前展示</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat-item">
          <span>📕 小红书</span>
          <span class="stat-value" id="stat-xiaohongshu">0</span>
        </div>
        <div class="stat-item">
          <span>📟 微博</span>
          <span class="stat-value" id="stat-weibo">0</span>
        </div>
        <div class="stat-item">
          <span>🎵 抖音</span>
          <span class="stat-value" id="stat-douyin">0</span>
        </div>
        <div class="stat-item">
          <span>📺️ B站</span>
          <span class="stat-value" id="stat-bilibili">0</span>
        </div>
      </div>

      <!-- 用户位置 -->
      <div class="section">
        <h2>我的位置</h2>
        <button onclick="locateUser()" class="locate-btn">📍 定位我的位置</button>
        <div class="location-status" id="location-status"></div>
        <div class="location-actions">
          <button onclick="sortHotspotsByDistance()" class="sort-btn" id="sort-btn" disabled>
            📏 按距离排序
          </button>
        </div>
        <div class="distance-filter">
          <h3 style="margin: 15px 0 10px 0; font-size: 14px;">距离筛选</h3>
          <div class="distance-filter-group">
            <button class="distance-filter-btn active" onclick="filterByDistance(null)" data-distance="null">
              全部
            </button>
            <button class="distance-filter-btn" onclick="filterByDistance(5)" data-distance="5">
              5km
            </button>
            <button class="distance-filter-btn" onclick="filterByDistance(10)" data-distance="10">
              10km
            </button>
            <button class="distance-filter-btn" onclick="filterByDistance(50)" data-distance="50">
              50km
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 地图区域 -->
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <!-- Logger (必须在其他脚本之前加载) -->
  <script src="js/utils/logger.js?nocache=1"></script>

  <!-- PWA & Data (新增，集成版本) -->
  <script src="js/idb.js?nocache=1"></script>
  <script src="js/data/sync.js?nocache=1"></script>
  <script src="sw.js?nocache=1"></script>

  <!-- App Scripts (集成版本) -->
  <script src="js/app-integrated.js?nocache=1"></script>
</body>
</html>
